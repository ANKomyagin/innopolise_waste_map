# Production docker-compose.yml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      - DATABASE_URL=postgresql://waste_user:waste_password@postgres:5432/waste_db
      - BOT_TOKEN=${BOT_TOKEN}
      - VK_TOKEN=${VK_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - waste_network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=waste_db
      - POSTGRES_USER=waste_user
      - POSTGRES_PASSWORD=waste_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waste_user -d waste_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waste_network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - waste_network

volumes:
  postgres_data:

networks:
  waste_network:
    driver: bridge
