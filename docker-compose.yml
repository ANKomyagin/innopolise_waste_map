services:
  api:
    build: .
    container_name: waste_api
    # ИСПРАВЛЕНО: путь к приложению теперь app.main:app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8321:8000"
    restart: always

  parser:
    build: .
    container_name: waste_parser
    command: python -m app.infrastructure.telegram.tg_parser
    depends_on:
      - api
    restart: always