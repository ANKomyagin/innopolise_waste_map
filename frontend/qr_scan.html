<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сообщить о заполнении</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4 text-gray-800 dark:text-gray-200">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <div class="bg-green-600 p-6 text-center text-white">
            <i class="fas fa-qrcode text-4xl mb-2"></i>
            <h1 class="text-2xl font-bold">QRBIN Иннополис</h1>
            <p class="text-green-100 text-sm mt-1">Помогите городу стать чище</p>
        </div>
        
        <form id="reportForm" class="p-6 space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">ID Контейнера</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-trash-alt text-gray-400"></i>
                    </div>
                    <input type="text" id="containerId" required readonly class="w-full pl-10 pr-4 py-3 bg-gray-100 dark:bg-gray-700 border-0 rounded-xl font-mono text-lg text-gray-700 dark:text-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="block text-sm font-medium text-gray-500 dark:text-gray-400">Уровень заполнения</label>
                    <span id="fillText" class="text-2xl font-bold text-yellow-500">50%</span>
                </div>
                <input type="range" id="fillPercent" min="0" max="100" step="10" value="50" class="w-full h-3 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-green-600">
                <div class="flex justify-between text-xs text-gray-400 mt-2">
                    <span>Пустой</span>
                    <span>Половина</span>
                    <span>Полный</span>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Вы здесь как:</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="resident" checked class="peer sr-only">
                        <div class="text-center py-2 rounded-xl border-2 border-gray-200 dark:border-gray-600 peer-checked:border-green-500 peer-checked:bg-green-50 dark:peer-checked:bg-green-900/30 peer-checked:text-green-700 dark:peer-checked:text-green-400 transition-all">
                            <i class="fas fa-user mb-1 block"></i> Житель
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="contractor" class="peer sr-only">
                        <div class="text-center py-2 rounded-xl border-2 border-gray-200 dark:border-gray-600 peer-checked:border-green-500 peer-checked:bg-green-50 dark:peer-checked:bg-green-900/30 peer-checked:text-green-700 dark:peer-checked:text-green-400 transition-all">
                            <i class="fas fa-hard-hat mb-1 block"></i> Сотрудник
                        </div>
                    </label>
                </div>
            </div>

            <input type="hidden" id="deviceId">
            <input type="hidden" id="userLat">
            <input type="hidden" id="userLon">

            <button type="submit" id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-paper-plane"></i> Отправить отчет
            </button>
        </form>

        <div id="message" class="hidden mx-6 mb-6 p-4 rounded-xl text-center font-medium"></div>
    </div>

    <script src="js/qr_scan.js"></script>
</body>
</html>
