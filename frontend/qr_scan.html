<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Сканирование - Иннополис Карта Мусора</title>
    <link rel="stylesheet" href="css/qr_scan.css">
</head>
<body>
    <div class="container">
        <h1>🗑️ QR Сканирование Контейнера</h1>

        <form id="reportForm">
            <div class="form-group">
                <label for="containerId">ID Контейнера:</label>
                <input type="text" id="containerId" required readonly>
            </div>

            <div class="form-group">
                <label for="fillPercent">Уровень заполнения:</label>
                <input type="range" id="fillPercent" min="0" max="100" value="50" required>
                <div class="fill-indicator">
                    <div class="fill-bar">
                        <div id="fillLevel" class="fill-level fill-low" style="width: 50%"></div>
                    </div>
                    <span id="fillText">50%</span>
                </div>
            </div>

            <div class="form-group">
                <label for="role">Ваша роль:</label>
                <select id="role" required>
                    <option value="resident">Житель</option>
                    <option value="contractor">Сотрудник подрядчика</option>
                </select>
            </div>

            <div class="form-group">
                <label for="deviceId">ID Устройства:</label>
                <input type="text" id="deviceId" required placeholder="Уникальный ID вашего телефона">
            </div>

            <button type="submit">Отправить данные</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script src="js/qr_scan.js"></script>
</body>
</html>
