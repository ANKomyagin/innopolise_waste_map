<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Сканирование - Карта Мусора</title>
    <link rel="stylesheet" href="css/qr_scan.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🗑️ Контроль контейнера</h1>
            <p class="subtitle">Иннополис: Экологичный город</p>
        </header>

        <form id="reportForm">
            <!-- ID Контейнера (только для чтения) -->
            <div class="form-group">
                <label for="containerId">ID Контейнера</label>
                <input type="text" id="containerId" class="readonly-input" required readonly>
            </div>

            <!-- Объединенная шкала и ползунок -->
            <div class="form-group">
                <div class="label-row">
                    <label>Уровень заполнения</label>
                    <span id="fillText" class="percent-badge">50%</span>
                </div>
                <div class="range-container">
                    <input type="range" id="fillPercent" min="0" max="100" value="50" step="5">
                    <div class="range-track-bg"></div>
                    <div id="rangeFill" class="range-track-fill" style="width: 50%"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="role">Ваша роль</label>
                <select id="role" required>
                    <option value="resident">Житель</option>
                    <option value="contractor">Сотрудник подрядчика</option>
                </select>
            </div>

            <!-- Скрытое поле для ID устройства -->
            <input type="hidden" id="deviceId">

            <button type="submit" id="submitBtn">Отправить отчет</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script src="js/qr_scan.js"></script>
</body>
</html>
