<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сообщить о заполнении</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4 text-gray-800 dark:text-gray-200">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <div class="bg-green-600 p-6 text-center text-white">
            <i class="fas fa-qrcode text-4xl mb-2"></i>
            <h1 class="text-2xl font-bold">QRBIN Иннополис</h1>
            <p class="text-green-100 text-sm mt-1">Помогите городу стать чище</p>
        </div>
        
        <form id="reportForm" class="p-6 space-y-8">
            <div class="text-center">
                <h2 class="text-xl font-medium text-gray-800 dark:text-gray-200 mb-2">Оцените заполненность</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Передвиньте ползунок, чтобы указать, насколько заполнен бак прямо сейчас.</p>
            </div>

            <!-- Скрытый ID контейнера -->
            <input type="hidden" id="containerId" required readonly>

            <div class="pt-4 pb-8">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Уровень:</span>
                    <span id="fillText" class="text-4xl font-bold text-yellow-500">50%</span>
                </div>
                <input type="range" id="fillPercent" min="0" max="100" step="10" value="50" class="w-full h-4 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-green-600">
                <div class="flex justify-between text-sm text-gray-400 mt-3 font-medium">
                    <span>Пустой</span>
                    <span>Половина</span>
                    <span>Полный</span>
                </div>
            </div>

            <input type="hidden" id="deviceId">
            <input type="hidden" id="userLat">
            <input type="hidden" id="userLon">

            <button type="submit" id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-[0_4px_14px_0_rgba(22,163,74,0.39)] hover:shadow-[0_6px_20px_rgba(22,163,74,0.23)] transition-all active:scale-95 flex items-center justify-center gap-2 text-lg">
                <i class="fas fa-paper-plane"></i> Отправить
            </button>
        </form>

        <div id="message" class="hidden mx-6 mb-6 p-4 rounded-xl text-center font-medium"></div>
    </div>

    <script src="js/qr_scan.js"></script>
</body>
</html>
