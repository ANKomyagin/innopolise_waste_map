{% extends "base.html" %}

{% block title %}Карта контейнеров{% endblock %}

{% block header_actions %}
<a href="/" class="text-blue-600 hover:text-blue-800 font-medium flex items-center gap-2">
    <i class="fas fa-arrow-left"></i>
    На главную
</a>
{% endblock %}

{% block content %}
<div class="pointer-events-auto fixed md:relative bottom-0 left-0 w-full md:w-full bg-white md:bg-white/95 dark:bg-gray-800 md:dark:bg-gray-800/95 rounded-t-2xl md:rounded-lg shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] md:shadow-lg transition-all duration-300 flex flex-col z-50" 
     :class="expanded ? 'h-[70vh] md:h-full' : 'h-[10vh] min-h-[60px] md:h-full'" 
     @touchstart="touchStartY = $event.touches[0].clientY"
     @touchend="touchEndY = $event.changedTouches[0].clientY; if(touchEndY - touchStartY > 50) expanded = false; if(touchStartY - touchEndY > 50) expanded = true;"
     x-data="residentApp()">
    <!-- Draggable header for mobile -->
    <div class="md:hidden flex justify-center py-2 cursor-pointer" @click="expanded = !expanded">
        <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
    </div>
    
    <div class="flex-1 overflow-y-auto px-4 pb-4" x-show="expanded || window.innerWidth >= 768" x-transition.opacity>
        <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4">Поиск контейнера</h2>
        
        <!-- Address Search -->
        <div class="mb-4 relative">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Мой адрес</label>
            <div class="relative">
                <input type="text" x-model="searchQuery" @input="searchAddress" placeholder="Введите адрес или кликните на карте" 
                       class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
            
            <!-- Autocomplete dropdown -->
            <ul x-show="suggestions.length > 0" class="absolute z-50 w-full mt-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg max-h-48 overflow-y-auto">
                <template x-for="item in suggestions" :key="item.address">
                    <li @click="selectAddress(item)" class="px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer text-gray-800 dark:text-white border-b border-gray-100 dark:border-gray-600 last:border-0">
                        <span x-text="item.address"></span>
                    </li>
                </template>
            </ul>
        </div>
        
        <button @click="findNearest()" :disabled="!userLocation" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-3 rounded-lg transition-colors flex items-center justify-center gap-2 mb-4">
            <i class="fas fa-route"></i> Найти ближайший свободный
        </button>
        
        <!-- Route Info -->
        <div x-show="routeInfo" class="bg-blue-50 dark:bg-blue-900/30 p-4 rounded-lg border border-blue-100 dark:border-blue-800 mb-4">
            <h4 class="font-bold text-blue-800 dark:text-blue-300 mb-2">Маршрут построен</h4>
            <p class="text-sm text-gray-700 dark:text-gray-300">Расстояние: <span class="font-bold" x-text="routeInfo?.distance + ' км'"></span></p>
            <p class="text-sm text-gray-700 dark:text-gray-300">Время пешком: <span class="font-bold" x-text="Math.round(routeInfo?.distance * 1000 / 80) + ' мин'"></span></p>
            <button @click="clearRoute()" class="mt-3 text-sm text-red-600 hover:text-red-800 font-medium"><i class="fas fa-times"></i> Сбросить</button>
        </div>
        
        <!-- Legend (compact) -->
        <div class="mt-auto pt-4 border-t border-gray-200 dark:border-gray-700">
            <div class="flex gap-4 justify-between text-xs text-gray-600 dark:text-gray-400">
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-green-500"></div> Свободно</div>
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-yellow-500"></div> Средне</div>
                <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-500"></div> Занято</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="js/resident.js?v=2"></script>
{% endblock %}
