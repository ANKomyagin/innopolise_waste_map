<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Иннополис Карта Мусора</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls">
        <h3>Управление</h3>
        <button onclick="refreshData()">Обновить данные</button>
        <button onclick="showStats()">Статистика</button>
    </div>
    
    <div class="legend">
        <h4>Легенда</h4>
        <div class="legend-item">
            <div class="legend-color" style="background-color: green;"></div>
            <span>Менее 50% заполнения</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: yellow;"></div>
            <span>50-70% заполнения</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: red;"></div>
            <span>Более 70% заполнения</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markers = [];

        // Инициализация карты
        function initMap() {
            map = L.map('map').setView([55.753, 48.743], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            loadContainers();
        }

        // Загрузка данных о контейнерах
        async function loadContainers() {
            try {
                const response = await fetch('/api/map/geojson');
                const data = await response.json();
                
                // Очистка старых маркеров
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];

                // Добавление новых маркеров
                data.features.forEach(feature => {
                    const coords = feature.geometry.coordinates;
                    const props = feature.properties;
                    
                    const marker = L.circleMarker([coords[1], coords[0]], {
                        radius: 8,
                        fillColor: props.color,
                        color: '#000',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);

                    marker.bindPopup(`
                        <b>Контейнер: ${props.id}</b><br>
                        Адрес: ${props.address}<br>
                        Заполненность: ${props.fill_percent}%<br>
                        Батарея: ${props.battery}<br>
                        Температура: ${props.temperature}
                    `);

                    markers.push(marker);
                });
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }

        // Обновление данных
        function refreshData() {
            loadContainers();
        }

        // Показ статистики
        async function showStats() {
            try {
                const response = await fetch('/api/analytics/dashboard');
                const stats = await response.json();
                
                alert(`
                    Статистика:
                    Всего контейнеров: ${stats.total_containers}
                    Требуют вывоза: ${stats.needs_collection_now}
                    Аппаратных сбоев: ${stats.hardware_alerts_count}
                `);
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', initMap);

        // Обновление каждые 5 минут
        setInterval(loadContainers, 300000);
    </script>
</body>
</html>
