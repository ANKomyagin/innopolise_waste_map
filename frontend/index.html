<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Иннополис Умная Система Управления Отходами</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Yandex Maps API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=7d253372-5194-4f00-a292-ea1d7bc18844" type="text/javascript"></script>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls p-3 rounded-3 shadow-sm">
        <h5 class="mb-3">🎛️ Управление</h5>
        <div class="d-grid gap-2">
            <button class="btn btn-primary" onclick="refreshData()">🔄 Обновить данные</button>
            <button class="btn btn-info" onclick="showStats()">📊 Статистика</button>
            <button class="btn btn-success" onclick="centerOnInnopolis()">🏙️ Центр города</button>
        </div>
    </div>
    
    <div class="legend p-3 rounded-3 shadow-sm">
        <h6 class="mb-2">📋 Легенда</h6>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #28a745;"></div>
            <span>< 50%</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #ffc107;"></div>
            <span>50-70%</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #dc3545;"></div>
            <span>> 70%</span>
        </div>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📊 Статистика контейнеров</h5>
                    <button type="button" class="btn-close" onclick="closeStats()"></button>
                </div>
                <div class="modal-body">
                    <div id="statsData"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeStats()">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/map.js"></script>
</body>
</html>
