<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Innopolis Waste Map{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    
    <!-- MapLibre GL JS CSS -->
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="css/theme.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        
        #app {
            min-height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .app-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }
        
        header {
            transition: transform 0.3s ease;
        }
        
        header.hide {
            transform: translateY(-100%);
        }
    </style>
</head>
<body>
    <div id="app" x-data="headerScroll()">
        <!-- Header -->
        <header class="pointer-events-auto fixed top-0 w-full z-50 transition-transform duration-300 bg-white dark:bg-gray-800 dark:text-white border-b border-gray-200 dark:border-gray-700" :class="{ 'hide': hideHeader }">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                <h1 class="text-2xl font-bold">Innopolis QRBIN</h1>
                <div class="flex items-center gap-4">
                    <!-- Theme toggle button -->
                    <button @click="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        <i :class="isDarkMode ? 'fas fa-sun text-yellow-500' : 'fas fa-moon text-gray-600'"></i>
                    </button>
                    {% block header_actions %}{% endblock %}
                </div>
            </div>
        </header>
        
        <!-- Layout block (can be overridden by child templates) -->
        <div class="app-overlay">
            {% block layout %}
            <!-- Default Map App Layout -->
            <div id="map" class="fixed inset-0 z-0"></div>
            <div class="pointer-events-none relative z-10 flex-1 pt-20 p-4 flex flex-col">
                <main class="w-full md:max-w-sm flex-1 flex flex-col pointer-events-none">
                    {% block content %}{% endblock %}
                </main>
            </div>
            {% endblock %}
        </div>
        
        <!-- Container Details Modal (shared across all pages) -->
        <div x-data="{ selectedFeature: null }" 
             @container-selected.window="selectedFeature = $event.detail" 
             x-show="selectedFeature" 
             style="display: none;" 
             class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4" 
             @click="selectedFeature = null">
            
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-md relative" @click.stop>
                <!-- Header -->
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                        <i class="fas fa-map-marker-alt text-green-600"></i>
                        Детали площадки
                    </h3>
                    <button @click="selectedFeature = null" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-white text-2xl">&times;</button>
                </div>
                
                <!-- Content -->
                <div class="space-y-4">
                    <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg">
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">Адрес:</p>
                        <p class="text-gray-800 dark:text-white font-medium" x-text="selectedFeature?.address"></p>
                    </div>
                    
                    <div class="flex justify-between items-center bg-gray-50 dark:bg-gray-700 p-4 rounded-lg">
                        <div>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Контейнеров:</p>
                            <p class="text-xl font-bold text-gray-800 dark:text-white" x-text="selectedFeature?.container_count"></p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-500 dark:text-gray-400">Средняя заполненность:</p>
                            <p class="text-xl font-bold" 
                               :class="selectedFeature?.avg_fill_percent >= 70 ? 'text-red-500' : (selectedFeature?.avg_fill_percent >= 50 ? 'text-yellow-500' : 'text-green-500')" 
                               x-text="selectedFeature?.avg_fill_percent + '%'"></p>
                        </div>
                    </div>
                    
                    <button @click="selectedFeature = null" class="w-full mt-4 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white font-medium py-3 rounded-lg transition-colors">
                        Закрыть
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    
    <script>
        // Alpine.js component for header scroll behavior and theme toggle
        function headerScroll() {
            return {
                hideHeader: false,
                isDarkMode: false,
                lastScrollY: 0,
                
                init() {
                    // Load theme preference from localStorage
                    const savedTheme = localStorage.getItem('theme') || 'light';
                    this.isDarkMode = savedTheme === 'dark';
                    this.applyTheme();
                    
                    // Listen for scroll events
                    window.addEventListener('scroll', () => this.handleScroll());
                },
                
                handleScroll() {
                    const currentScrollY = window.scrollY;
                    
                    // Hide header when scrolling down, show when scrolling up
                    if (currentScrollY > this.lastScrollY && currentScrollY > 100) {
                        this.hideHeader = true;
                    } else {
                        this.hideHeader = false;
                    }
                    
                    this.lastScrollY = currentScrollY;
                },
                
                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    this.applyTheme();
                },
                
                applyTheme() {
                    const html = document.documentElement;
                    if (this.isDarkMode) {
                        html.classList.add('dark');
                    } else {
                        html.classList.remove('dark');
                    }
                    const theme = this.isDarkMode ? 'dark' : 'light';
                    localStorage.setItem('theme', theme);
                }
            };
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            window.map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'osm-tiles': {
                            type: 'raster',
                            tiles: [window.location.origin + '/tiles/{z}/{x}/{y}.png'],
                            tileSize: 256,
                            minzoom: 12,
                            maxzoom: 18
                        }
                    },
                    layers: [
                        {
                            id: 'osm-layer',
                            type: 'raster',
                            source: 'osm-tiles',
                            minzoom: 12,
                            maxzoom: 18
                        }
                    ]
                },
                center: [48.743, 55.753],
                zoom: 14,
                minZoom: 12,
                maxZoom: 18
            });
            
            map.on('load', function() {
                console.log('Map loaded successfully');
                window.dispatchEvent(new Event('map-loaded'));
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
