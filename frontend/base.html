<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Innopolis Waste Map{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre GL JS CSS -->
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        #app {
            height: 100dvh;
            position: relative;
        }
        
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Map background -->
        <div id="map"></div>
        
        <!-- Overlay container with pointer-events disabled -->
        <div class="pointer-events-none absolute inset-0 flex flex-col">
            <!-- Header -->
            <header class="pointer-events-auto bg-white shadow-md">
                <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">Innopolis Waste Map</h1>
                    <div class="flex items-center gap-4">
                        {% block header_actions %}{% endblock %}
                    </div>
                </div>
            </header>
            
            <!-- Main content area (sidebar) -->
            <main class="pointer-events-auto flex-1 overflow-auto bg-white bg-opacity-95 max-w-sm m-4 rounded-lg shadow-lg">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'osm-tiles': {
                            type: 'raster',
                            tiles: [window.location.origin + '/tiles/{z}/{x}/{y}.png'],
                            tileSize: 256,
                            minzoom: 12,
                            maxzoom: 18
                        }
                    },
                    layers: [
                        {
                            id: 'osm-layer',
                            type: 'raster',
                            source: 'osm-tiles',
                            minzoom: 12,
                            maxzoom: 18
                        }
                    ]
                },
                center: [48.743, 55.753],
                zoom: 14,
                minZoom: 12,
                maxZoom: 18
            });
            
            map.on('load', function() {
                console.log('Map loaded successfully');
                window.dispatchEvent(new Event('map-loaded'));
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
