<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Innopolis Waste Map{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre GL JS CSS -->
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="css/theme.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        
        #app {
            min-height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .app-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }
        
        header {
            transition: transform 0.3s ease;
        }
        
        header.hide {
            transform: translateY(-100%);
        }
    </style>
</head>
<body>
    <div id="app" x-data="headerScroll()">
        <!-- Map background -->
        <div id="map"></div>
        
        <!-- Overlay container -->
        <div class="app-overlay pointer-events-none">
            <!-- Header -->
            <header class="pointer-events-auto fixed top-0 w-full z-50 transition-transform duration-300" :class="{ 'hide': hideHeader }">
                <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">Innopolis QRBIN</h1>
                    <div class="flex items-center gap-4">
                        <!-- Theme toggle button -->
                        <button @click="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                            <i :class="isDarkMode ? 'fas fa-sun text-yellow-500' : 'fas fa-moon text-gray-600'"></i>
                        </button>
                        {% block header_actions %}{% endblock %}
                    </div>
                </div>
            </header>
            
            <!-- Main content area (sidebar) -->
            <main class="pointer-events-auto flex-1 overflow-auto mt-16 bg-white/95 dark:bg-gray-900/95 max-w-sm m-4 rounded-lg shadow-lg">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    
    <script>
        // Alpine.js component for header scroll behavior and theme toggle
        function headerScroll() {
            return {
                hideHeader: false,
                isDarkMode: false,
                lastScrollY: 0,
                
                init() {
                    // Load theme preference from localStorage
                    const savedTheme = localStorage.getItem('theme') || 'light';
                    this.isDarkMode = savedTheme === 'dark';
                    this.applyTheme();
                    
                    // Listen for scroll events
                    window.addEventListener('scroll', () => this.handleScroll());
                },
                
                handleScroll() {
                    const currentScrollY = window.scrollY;
                    
                    // Hide header when scrolling down, show when scrolling up
                    if (currentScrollY > this.lastScrollY && currentScrollY > 100) {
                        this.hideHeader = true;
                    } else {
                        this.hideHeader = false;
                    }
                    
                    this.lastScrollY = currentScrollY;
                },
                
                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    this.applyTheme();
                },
                
                applyTheme() {
                    const html = document.documentElement;
                    const theme = this.isDarkMode ? 'dark' : 'light';
                    html.setAttribute('data-theme', theme);
                    localStorage.setItem('theme', theme);
                }
            };
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            window.map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'osm-tiles': {
                            type: 'raster',
                            tiles: [window.location.origin + '/tiles/{z}/{x}/{y}.png'],
                            tileSize: 256,
                            minzoom: 12,
                            maxzoom: 18
                        }
                    },
                    layers: [
                        {
                            id: 'osm-layer',
                            type: 'raster',
                            source: 'osm-tiles',
                            minzoom: 12,
                            maxzoom: 18
                        }
                    ]
                },
                center: [48.743, 55.753],
                zoom: 14,
                minZoom: 12,
                maxZoom: 18
            });
            
            map.on('load', function() {
                console.log('Map loaded successfully');
                window.dispatchEvent(new Event('map-loaded'));
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
