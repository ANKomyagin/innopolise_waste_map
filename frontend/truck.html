<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маршрут мусоровоза</title>
    
    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/truck.css">
    
    <!-- Yandex Maps API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=7d253372-5194-4f00-a292-ea1d7bc18844" type="text/javascript"></script>
</head>
<body>
    <div class="top-bar">
        <h4><i class="fas fa-truck"></i> Режим мусоровоза</h4>
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> На главную</a>
    </div>

    <div id="map"></div>
    
    <div class="controls">
        <div class="stats-box">
            <h3 id="containerCount">0</h3>
            <p>Контейнеров требуют вывоза</p>
        </div>

        <h5><i class="fas fa-route"></i> Построение маршрута</h5>
        
        <div class="threshold-selector">
            <label for="fillThreshold">Порог заполненности: <span id="thresholdValue">50</span>%</label>
            <input type="range" class="form-range" id="fillThreshold" min="30" max="90" value="50" oninput="updateThreshold(this.value)">
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-custom btn-build-route" onclick="buildOptimalRoute()">
                <i class="fas fa-map-marked-alt"></i> Построить оптимальный маршрут
            </button>
            <button class="btn btn-custom btn-secondary" onclick="clearRoute()">
                <i class="fas fa-times"></i> Очистить маршрут
            </button>
        </div>
        
        <div id="routeInfo" class="route-info" style="display: none;">
            <h6><i class="fas fa-info-circle"></i> Информация о маршруте</h6>
            <p id="routeDistance"></p>
            <p id="routeDuration"></p>
        </div>

        <div id="containerList" class="container-list"></div>
    </div>

    <!-- Custom JS -->
    <script src="js/truck.js"></script>
</body>
</html>
