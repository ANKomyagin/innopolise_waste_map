{% extends "base.html" %}

{% block title %}Панель Водителя{% endblock %}

{% block header_actions %}
<button onclick="localStorage.clear(); window.location.href='/'" class="text-red-600 hover:text-red-800 font-medium flex items-center gap-2">
    <i class="fas fa-sign-out-alt"></i>
    Выйти
</button>
{% endblock %}

{% block content %}
<div class="w-full md:w-[32rem]">
    <!-- Container Count Card -->
    <div class="bg-white/90 backdrop-blur rounded-lg shadow p-6 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm text-gray-600">Контейнеров требуют вывоза</p>
                <h3 id="containerCount" class="text-4xl font-bold text-orange-600">0</h3>
            </div>
            <i class="fas fa-truck text-5xl text-orange-500 opacity-20"></i>
        </div>
    </div>
    
    <!-- Route Building Section -->
    <div class="bg-white/90 backdrop-blur rounded-lg shadow p-6 mb-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i class="fas fa-route text-blue-600"></i>
            Построение маршрута
        </h3>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Порог заполненности: <span id="thresholdValue" class="font-bold text-blue-600">50</span>%
            </label>
            <input type="range" id="fillThreshold" min="30" max="90" value="50" 
                   class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" 
                   oninput="updateThreshold(this.value)">
        </div>
        
        <div class="flex gap-3">
            <button onclick="buildOptimalRoute()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-map-marked-alt"></i>
                Построить маршрут
            </button>
            <button onclick="clearRoute()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-times"></i>
                Очистить
            </button>
        </div>
    </div>
    
    <!-- Route Info -->
    <div id="routeInfo" class="hidden bg-white/90 backdrop-blur rounded-lg shadow p-6 mb-6">
        <h4 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
            <i class="fas fa-info-circle text-green-600"></i>
            Информация о маршруте
        </h4>
        <div class="space-y-2">
            <p class="text-gray-700">
                <span class="font-semibold">Дистанция:</span>
                <span id="routeDistance" class="text-blue-600 font-bold">-</span>
            </p>
            <p class="text-gray-700">
                <span class="font-semibold">Время в пути:</span>
                <span id="routeDuration" class="text-blue-600 font-bold">-</span>
            </p>
        </div>
    </div>
    
    <!-- Action Button -->
    <div id="actionPanel" class="hidden mt-4">
        <button onclick="emptyRouteContainers()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3 text-lg">
            <i class="fas fa-dumpster"></i>
            Маршрут завершен (очистить баки)
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="js/truck.js?v=3"></script>
{% endblock %}
