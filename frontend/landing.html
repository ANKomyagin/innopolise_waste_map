<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные контейнеры Иннополиса</title>
    
    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/landing.css">
    
    <!-- Yandex Maps API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=7d253372-5194-4f00-a292-ea1d7bc18844" type="text/javascript"></script>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="logo">
        <i class="fas fa-recycle"></i>
        Умные контейнеры Иннополиса
    </div>
    <button class="btn-login" onclick="openLoginModal()">
        <i class="fas fa-sign-in-alt"></i> Вход для сотрудников
    </button>
</div>

<!-- Main layout: sidebar + map -->
<div class="main-wrapper">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- Find container section -->
        <div class="sidebar-section">
            <h5><i class="fas fa-map-marker-alt"></i> Найти ближайший контейнер</h5>
            <button class="btn-action btn-location" onclick="setMyLocation()">
                <i class="fas fa-crosshairs"></i> Определить моё местоположение
            </button>
            <button class="btn-action btn-route" onclick="findNearestContainer()">
                <i class="fas fa-route"></i> Построить пеший маршрут
            </button>
            <button class="btn-action btn-clear" onclick="clearRoute()">
                <i class="fas fa-times"></i> Сбросить маршрут
            </button>
            <div id="routeInfo" class="route-info"></div>
        </div>

    </div>

    <!-- Yandex Map -->
    <div id="map"></div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay" onclick="if(event.target===this)closeLoginModal()">
    <div class="modal-box">
        <button class="modal-close" onclick="closeLoginModal()">&times;</button>
        <h2>Вход для сотрудников</h2>
        <p class="subtitle">Администратор или водитель мусоровоза</p>
        <div class="error-message" id="error-message"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Логин</label>
                <input type="text" id="username" name="username" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
    </div>
</div>

<script src="js/landing.js"></script>
</body>
</html>
