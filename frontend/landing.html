<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные контейнеры Иннополиса</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=7d253372-5194-4f00-a292-ea1d7bc18844" type="text/javascript"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(102,126,234,0.35);
            position: sticky;
            top: 0;
            z-index: 900;
        }
        .top-bar .logo {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-bar .logo i { font-size: 1.4rem; }
        .btn-login {
            background: rgba(255,255,255,0.18);
            color: #fff;
            border: 1.5px solid rgba(255,255,255,0.35);
            padding: 8px 22px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-login:hover {
            background: rgba(255,255,255,0.32);
            transform: translateY(-1px);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-wrapper {
            display: flex;
            height: calc(100vh - 54px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 360px;
            min-width: 360px;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 16px rgba(0,0,0,0.06);
            overflow-y: auto;
            z-index: 10;
        }
        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        .sidebar-section:last-child { border-bottom: none; }
        .sidebar-section h5 {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-section h5 i { color: #667eea; }

        .btn-action {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-action:last-child { margin-bottom: 0; }

        .btn-location {
            background: #f0f4ff;
            color: #667eea;
            border: 2px solid #d6dffe;
        }
        .btn-location:hover {
            background: #e0e7ff;
            border-color: #667eea;
        }
        .btn-route {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
        }
        .btn-route:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(79,172,254,0.4);
        }
        .btn-clear {
            background: #f8f9fa;
            color: #6c757d;
            border: 2px solid #dee2e6;
        }
        .btn-clear:hover {
            background: #e9ecef;
        }

        /* Route info card */
        .route-info {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #bae6fd;
            display: none;
            margin-top: 12px;
        }
        .route-info.active { display: block; }
        .route-info h6 {
            color: #0284c7;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .route-info p {
            margin: 6px 0;
            font-size: 0.88rem;
            color: #334155;
        }
        .route-info p strong { color: #1e293b; }

        /* Stats cards */
        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-card.full-width {
            grid-column: 1 / -1;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #667eea;
            line-height: 1.1;
        }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.danger { color: #ef4444; }
        .stat-label {
            font-size: 0.78rem;
            color: #94a3b8;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Legend */
        .legend-items { display: flex; flex-direction: column; gap: 8px; }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            color: #555;
        }
        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        /* ===== MAP ===== */
        #map {
            flex: 1;
            height: 100%;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #fff;
            padding: 32px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .modal-box h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .modal-box .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .modal-close:hover { color: #333; }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.88rem;
            color: #475569;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.88rem;
            display: none;
            border: 1px solid #fecaca;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 45vh;
                order: 2;
            }
            #map { height: 55vh; order: 1; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="logo">
        <i class="fas fa-recycle"></i>
        Умные контейнеры Иннополиса
    </div>
    <button class="btn-login" onclick="openLoginModal()">
        <i class="fas fa-sign-in-alt"></i> Вход для сотрудников
    </button>
</div>

<!-- Main layout: sidebar + map -->
<div class="main-wrapper">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- Find container section -->
        <div class="sidebar-section">
            <h5><i class="fas fa-map-marker-alt"></i> Найти ближайший контейнер</h5>
            <button class="btn-action btn-location" onclick="setMyLocation()">
                <i class="fas fa-crosshairs"></i> Определить моё местоположение
            </button>
            <button class="btn-action btn-route" onclick="findNearestContainer()">
                <i class="fas fa-route"></i> Построить пеший маршрут
            </button>
            <button class="btn-action btn-clear" onclick="clearRoute()">
                <i class="fas fa-times"></i> Сбросить маршрут
            </button>
            <div id="routeInfo" class="route-info"></div>
        </div>

        <!-- Stats section -->
        <div class="sidebar-section">
            <h5><i class="fas fa-chart-bar"></i> Статистика</h5>
            <div class="stat-row">
                <div class="stat-card">
                    <div class="stat-value" id="total-containers">—</div>
                    <div class="stat-label">Всего контейнеров</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value danger" id="full-containers">—</div>
                    <div class="stat-label">Требуют вывоза</div>
                </div>
                <div class="stat-card full-width">
                    <div class="stat-value warning" id="avg-fill">—</div>
                    <div class="stat-label">Средняя заполненность</div>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="sidebar-section">
            <h5><i class="fas fa-info-circle"></i> Легенда</h5>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-dot" style="background:#28a745;"></div>
                    <span>Свободно (&lt;50%)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#ffc107;"></div>
                    <span>Заполнено (50–70%)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#dc3545;"></div>
                    <span>Переполнено (&gt;70%)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Yandex Map -->
    <div id="map"></div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay" onclick="if(event.target===this)closeLoginModal()">
    <div class="modal-box">
        <button class="modal-close" onclick="closeLoginModal()">&times;</button>
        <h2>Вход для сотрудников</h2>
        <p class="subtitle">Администратор или водитель мусоровоза</p>
        <div class="error-message" id="error-message"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Логин</label>
                <input type="text" id="username" name="username" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
    </div>
</div>

<script>
    // ============ STATE ============
    let map;
    let userLocation = null;
    let userPlacemark = null;
    let routeLine = null;
    let containers = [];

    // ============ MAP INIT ============
    ymaps.ready(function() {
        map = new ymaps.Map("map", {
            center: [55.753, 48.743],
            zoom: 14,
            controls: ['zoomControl', 'geolocationControl', 'typeSelector']
        });
        loadContainers();
    });

    // ============ LOAD CONTAINERS ============
    async function loadContainers() {
        try {
            const response = await fetch('/api/map/geojson');
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const data = await response.json();
            if (!data || !data.features) throw new Error('Invalid data');

            let totalCount = 0;
            let fullCount = 0;
            let fillSum = 0;

            data.features.forEach(feature => {
                const coords = feature.geometry.coordinates;
                const props = feature.properties;
                if (!props.containers || props.containers.length === 0) return;

                props.containers.forEach(c => {
                    containers.push({
                        id: c.id, lat: c.lat, lon: c.lon,
                        fill: c.fill_percent, address: c.address
                    });
                    totalCount++;
                    fillSum += c.fill_percent;
                    if (c.fill_percent >= 70) fullCount++;
                });

                const avgFill = props.avg_fill_percent || (props.containers.length === 1 ? props.containers[0].fill_percent : 0);
                let fillColor = '#28a745';
                if (avgFill >= 70) fillColor = '#dc3545';
                else if (avgFill >= 50) fillColor = '#ffc107';

                const containerCount = props.container_count || props.containers.length;
                const iconSize = 60;
                const iconSvg = `
                    <svg width="${iconSize}" height="${iconSize}" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
                                <feOffset dx="0" dy="3" result="ob"/>
                                <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
                                <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                        </defs>
                        <circle cx="30" cy="30" r="26" fill="${fillColor}" opacity="0.2"/>
                        <circle cx="30" cy="30" r="24" fill="white" stroke="${fillColor}" stroke-width="3" filter="url(#s)"/>
                        <g transform="translate(30,30)">
                            <rect x="-14" y="-7" width="9" height="12" rx="1" fill="${fillColor}" opacity="0.8"/>
                            <rect x="-14" y="-9" width="9" height="2.5" rx="1" fill="${fillColor}"/>
                            <rect x="-4.5" y="-9" width="9" height="14" rx="1" fill="${fillColor}"/>
                            <rect x="-4.5" y="-11" width="9" height="2.5" rx="1" fill="${fillColor}"/>
                            <rect x="5" y="-7" width="9" height="12" rx="1" fill="${fillColor}" opacity="0.8"/>
                            <rect x="5" y="-9" width="9" height="2.5" rx="1" fill="${fillColor}"/>
                        </g>
                        <circle cx="46" cy="14" r="10" fill="#ff6b6b" stroke="white" stroke-width="2.5"/>
                        <text x="46" y="19" text-anchor="middle" fill="white" font-size="11" font-weight="bold">${containerCount}</text>
                    </svg>`;

                const fillPct = avgFill;
                const barColor = fillPct >= 70 ? '#dc3545' : fillPct >= 50 ? '#ffc107' : '#28a745';
                const containersList = props.containers.map(c => `
                    <div style="padding:8px;margin:4px 0;background:#f8f9fa;border-radius:6px;border-left:3px solid ${c.fill_percent>=70?'#dc3545':c.fill_percent>=50?'#ffc107':'#28a745'}">
                        <strong>${c.id}</strong> — ${c.fill_percent}%
                    </div>`).join('');

                const balloonBody = `
                    <div style="padding:8px;max-height:350px;overflow-y:auto">
                        <p style="margin:0 0 8px"><strong>Адрес:</strong> ${props.address || '—'}</p>
                        <div style="margin:8px 0">
                            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                                <span style="font-weight:600">Заполненность:</span>
                                <span style="font-weight:700;color:${barColor}">${fillPct}%</span>
                            </div>
                            <div style="width:100%;height:20px;background:#e9ecef;border-radius:10px;overflow:hidden">
                                <div style="width:${fillPct}%;height:100%;background:${barColor};border-radius:10px"></div>
                            </div>
                        </div>
                        <hr style="border:none;border-top:1px solid #dee2e6;margin:10px 0">
                        <strong>Контейнеры (${containerCount}):</strong>
                        ${containersList}
                    </div>`;

                const placemark = new ymaps.Placemark(
                    [coords[1], coords[0]],
                    {
                        balloonContentHeader: `<b>${props.is_cluster ? 'Площадка' : 'Контейнер'} (${containerCount})</b>`,
                        balloonContentBody: balloonBody,
                        hintContent: `${containerCount} конт., ${fillPct}%`
                    },
                    {
                        iconLayout: 'default#image',
                        iconImageHref: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSvg),
                        iconImageSize: [iconSize, iconSize],
                        iconImageOffset: [-iconSize/2, -iconSize/2]
                    }
                );
                map.geoObjects.add(placemark);
            });

            document.getElementById('total-containers').textContent = totalCount;
            document.getElementById('full-containers').textContent = fullCount;
            document.getElementById('avg-fill').textContent =
                totalCount > 0 ? Math.round(fillSum / totalCount) + '%' : '0%';

        } catch (err) {
            console.error('Ошибка загрузки контейнеров:', err);
        }
    }

    // ============ GEOLOCATION ============
    function setMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => placeUser([pos.coords.latitude, pos.coords.longitude]),
                () => {
                    alert('Не удалось определить местоположение. Кликните на карту, чтобы указать вручную.');
                    enableMapClick();
                }
            );
        } else {
            alert('Геолокация не поддерживается. Кликните на карту.');
            enableMapClick();
        }
    }

    function placeUser(coords) {
        userLocation = coords;
        if (userPlacemark) map.geoObjects.remove(userPlacemark);

        const icon = `<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="16" fill="#667eea" stroke="#fff" stroke-width="3"/>
            <circle cx="20" cy="20" r="6" fill="#fff"/>
        </svg>`;

        userPlacemark = new ymaps.Placemark(userLocation,
            { balloonContent: '<b>Вы здесь</b>', hintContent: 'Ваше местоположение' },
            {
                iconLayout: 'default#image',
                iconImageHref: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(icon),
                iconImageSize: [40,40],
                iconImageOffset: [-20,-20]
            }
        );
        map.geoObjects.add(userPlacemark);
        map.setCenter(userLocation, 15, { duration: 400 });
    }

    function enableMapClick() {
        map.events.add('click', function handler(e) {
            placeUser(e.get('coords'));
            map.events.remove('click', handler);
        });
    }

    // ============ NEAREST CONTAINER ============
    function findNearestContainer() {
        if (!userLocation) {
            alert('Сначала укажите ваше местоположение');
            return;
        }
        const available = containers.filter(c => c.fill < 70);
        if (available.length === 0) {
            alert('Все контейнеры переполнены');
            return;
        }
        let nearest = null, minDist = Infinity;
        available.forEach(c => {
            const d = haversine(userLocation[0], userLocation[1], c.lat, c.lon);
            if (d < minDist) { minDist = d; nearest = c; }
        });
        if (nearest) buildRoute(userLocation, [nearest.lat, nearest.lon], nearest, minDist);
    }

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function buildRoute(from, to, container, distance) {
        ymaps.route([from, to], { mapStateAutoApply: true, routingMode: 'pedestrian' })
            .then(route => {
                if (routeLine) map.geoObjects.remove(routeLine);
                route.getPaths().options.set({ strokeColor: '#667eea', strokeWidth: 5, opacity: 0.85 });
                map.geoObjects.add(route);
                routeLine = route;

                const walkMin = Math.round(distance / 80);
                const el = document.getElementById('routeInfo');
                el.innerHTML = `
                    <h6><i class="fas fa-check-circle"></i> Маршрут построен</h6>
                    <p><strong>Контейнер:</strong> ${container.id}</p>
                    <p><strong>Адрес:</strong> ${container.address || '—'}</p>
                    <p><strong>Расстояние:</strong> ${Math.round(distance)} м</p>
                    <p><strong>Пешком:</strong> ~${walkMin} мин</p>
                    <p><strong>Заполненность:</strong> ${container.fill}%</p>`;
                el.classList.add('active');
            })
            .catch(() => alert('Не удалось построить маршрут'));
    }

    function clearRoute() {
        if (routeLine) { map.geoObjects.remove(routeLine); routeLine = null; }
        const el = document.getElementById('routeInfo');
        el.classList.remove('active');
        el.innerHTML = '';
    }

    // ============ LOGIN ============
    function openLoginModal() {
        document.getElementById('loginModal').classList.add('active');
    }
    function closeLoginModal() {
        document.getElementById('loginModal').classList.remove('active');
        document.getElementById('error-message').style.display = 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const formData = new URLSearchParams();
        formData.append('username', document.getElementById('username').value);
        formData.append('password', document.getElementById('password').value);

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                if (data.role === 'admin') window.location.href = '/admin.html';
                else if (data.role === 'contractor') window.location.href = '/truck.html';
            } else {
                showError('Неверный логин или пароль');
            }
        } catch {
            showError('Ошибка подключения к серверу');
        }
    }

    function showError(msg) {
        const el = document.getElementById('error-message');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
