<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Иннополис: Умный вывоз мусора</title>

    <!-- Подключаем API Яндекс Карт с ВАШИМ рабочим ключом -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=7d253372-5194-4f00-a292-ea1d7bc18844&lang=ru_RU" type="text/javascript"></script>

    <style>
        body, html { padding: 0; margin: 0; height: 100%; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 100vh; }

        /* Панель управления */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        select, button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        button.action-btn { background: #007bff; color: white; font-weight: bold; border: none; }
        button.action-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <!-- Карта -->
    <div id="map"></div>

    <!-- Панель управления (переключатель ролей) -->
    <div class="control-panel">
        <h3>Управление системой</h3>
        <label>Ваша роль:</label>
        <select id="roleSelector" onchange="changeRole()">
            <option value="viewer">Житель (просмотр)</option>
            <option value="mayor">Мэрия (управление датчиками)</option>
            <option value="contractor">Подрядчик (вывоз мусора)</option>
        </select>

        <div id="mayor-tools" style="display: none;">
            <p style="font-size: 12px; color: gray;">*Кликните по карте, чтобы установить новый умный контейнер</p>
        </div>

        <div id="contractor-tools" style="display: none;">
            <button class="action-btn" onclick="buildOptimizedRoute()">🛣 Построить маршрут вывоза</button>
        </div>
    </div>

    <script>
        let myMap;
        let objectManager;
        let multiRoute; // Переменная для хранения маршрута мусоровоза
        let containersData = []; // Сюда загрузим данные с бекенда

        // Инициализация Яндекс Карт
        ymaps.ready(init);

        function init() {
            // Центр Иннополиса
            myMap = new ymaps.Map("map", {
                center: [55.7520, 48.7446],
                zoom: 15,
                controls: ['zoomControl', 'typeSelector', 'fullscreenControl']
            });

            // Менеджер объектов для удобной работы с большим кол-вом точек
            objectManager = new ymaps.ObjectManager({
                clusterize: true,
                gridSize: 32
            });
            myMap.geoObjects.add(objectManager);

            // Загружаем данные из нашей реальной БД (FastAPI)
            fetchContainers();

            // Обработка клика по карте (ДЛЯ МЭРИИ - добавление датчиков)
            myMap.events.add('click', function (e) {
                const role = document.getElementById('roleSelector').value;
                if (role !== 'mayor') return;

                const coords = e.get('coords');
                const confirmAdd = confirm(`Установить новый датчик на координатах: ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}?`);

                if (confirmAdd) {
                    alert("Датчик успешно добавлен в систему Цифрового Двойника!");
                    // Тут в будущем можно раскомментировать реальный POST запрос
                    fetchContainers();
                }
            });
        }

        // --- Загрузка и отрисовка данных с БЕКЕНДА ---
        async function fetchContainers() {
            try {
                // Делаем реальный запрос к вашему API
                const response = await fetch('/api/containers');

                if (!response.ok) {
                    throw new Error("Ошибка сети при загрузке контейнеров");
                }

                containersData = await response.json();

                // Отрисовываем реальные маркеры
                renderMarkers(containersData);
            } catch (error) {
                console.error("Ошибка загрузки данных:", error);
            }
        }

        function renderMarkers(data) {
            objectManager.removeAll();

            let features = data.map(container => {
                // Определяем цвет иконки в зависимости от заполненности
                let iconColor = '#00ea00'; // Зеленый
                if (container.fill_percent >= 40) iconColor = '#ffd700'; // Желтый
                if (container.fill_percent >= 70) iconColor = '#ff0000'; // Красный

                return {
                    type: 'Feature',
                    id: container.id,
                    geometry: {
                        type: 'Point',
                        coordinates: [container.lat, container.lon]
                    },
                    properties: {
                        balloonContentHeader: `♻️ Контейнер #${container.id}`,
                        balloonContentBody: `Заполненность: <b style="font-size: 16px;">${container.fill_percent}%</b><br><hr>ID датчика: SENS-${container.id}00X`,
                        hintContent: `Контейнер ${container.id} (Заполнено на ${container.fill_percent}%)`
                    },
                    options: {
                        preset: 'islands#circleIcon',
                        iconColor: iconColor
                    }
                };
            });

            objectManager.add({ type: 'FeatureCollection', features: features });
        }

        // --- Логика Подрядчика (Построение маршрута Яндекс Картами) ---
        function buildOptimizedRoute() {
            if (multiRoute) {
                myMap.geoObjects.remove(multiRoute); // Удаляем старый маршрут
            }

            // Ищем только те баки, где мусора >= 70%
            let pointsToVisit = containersData
                .filter(c => c.fill_percent >= 70)
                .map(c => [c.lat, c.lon]);

            if (pointsToVisit.length === 0) {
                alert("Нет переполненных контейнеров (>= 70%). Маршрут строить не нужно!");
                return;
            }

            // Добавляем начальную точку (База мусоровозов Иннополиса)
            const depotCoords = [55.7485, 48.7455];
            pointsToVisit.unshift(depotCoords); // Ставим базу в начало маршрута

            // Создаем мультимаршрут Яндекса с оптимизацией
            multiRoute = new ymaps.multiRouter.MultiRoute({
                referencePoints: pointsToVisit,
                params: {
                    routingMode: 'auto', // Автомобильный
                }
            }, {
                boundsAutoApply: true, // Карта сама зуммируется, чтобы вместить маршрут
                routeActiveStrokeWidth: 6,
                routeActiveStrokeColor: '#1E98FF'
            });

            myMap.geoObjects.add(multiRoute);
            alert(`Маршрут построен! Нужно вывезти ${pointsToVisit.length - 1} проблемных контейнеров.`);
        }

        // --- Переключение ролей UI ---
        function changeRole() {
            const role = document.getElementById('roleSelector').value;
            document.getElementById('mayor-tools').style.display = (role === 'mayor') ? 'block' : 'none';
            document.getElementById('contractor-tools').style.display = (role === 'contractor') ? 'block' : 'none';

            // Если ушли с роли подрядчика — очищаем маршрут
            if (role !== 'contractor' && multiRoute) {
                myMap.geoObjects.remove(multiRoute);
            }
        }
    </script>
</body>
</html>
